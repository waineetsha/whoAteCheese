<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>チーズドロボー</title>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 16px; }

  /* ③ プレイヤー一行表示 */
  #players {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    margin: 8px 0;
    font-size: 0.95em;
  }
  .player-count {
    background: #333;
    color: #fff;
    border-radius: 4px;
    padding: 2px 8px;
    font-weight: bold;
    white-space: nowrap;
  }
  .player-names {
    flex: 1;
  }
  .role-breakdown {
    color: #666;
    font-size: 0.9em;
    white-space: nowrap;
  }

  /* ① 結果表示 */
  .vote-log {
    background: #f5f5f5;
    border-left: 4px solid #ccc;
    padding: 8px 12px;
    margin: 12px 0;
    font-size: 0.95em;
    line-height: 1.8;
  }
  .executed-info {
    margin: 6px 0;
    font-size: 1.05em;
  }
  .win-thief {
    color: #c00;
    font-weight: bold;
    font-size: 1.1em;
  }
  .win-sleepy {
    color: #007a00;
    font-weight: bold;
    font-size: 1.1em;
  }

  /* ② もう一回ボタン */
  #replayBtn {
    margin-top: 16px;
    padding: 10px 28px;
    font-size: 1em;
    cursor: pointer;
    background: #333;
    color: #fff;
    border: none;
    border-radius: 6px;
  }
  #replayBtn:hover { background: #555; }
  #replayWait {
    margin-top: 16px;
    color: #888;
    font-size: 0.95em;
  }
</style>
</head>
<body>

<h1>チーズドロボー</h1>

<input id="name" placeholder="名前">
<input id="room" placeholder="ルームID">

<button id="createBtn" onclick="createRoom()">ルーム作成</button>
<button id="joinBtn" onclick="joinRoom()">参加</button>

<h2>プレイヤー</h2>
<div id="players"></div>

<button id="startBtn" onclick="startGame()" style="display:none;">
  ゲーム開始
</button>

<h2 id="night"></h2>

<div id="henchmanArea"></div>

<h2 id="team"></h2>

<h2 id="discussion"></h2>

<h2 id="vote"></h2>
<div id="voteArea"></div>

<h2 id="result"></h2>

<script type="module" src="app.js"></script>

</body>
</html>
